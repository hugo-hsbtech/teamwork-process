<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">

  <div class="eyebrow">SPACING · 8PX GRID</div>
  <div class="row tight" style="align-items:flex-end;">
    <div class="col" style="align-items:center; gap:6px;">
        <div style="width:4px; height:16px; background:var(--brand-tide); border-radius:2px;"></div>
        <div class="swatch-meta" style="text-align:center;"><span class="name">xs</span>4px</div>
      </div><div class="col" style="align-items:center; gap:6px;">
        <div style="width:8px; height:16px; background:var(--brand-tide); border-radius:2px;"></div>
        <div class="swatch-meta" style="text-align:center;"><span class="name">sm</span>8px</div>
      </div><div class="col" style="align-items:center; gap:6px;">
        <div style="width:12px; height:16px; background:var(--brand-tide); border-radius:2px;"></div>
        <div class="swatch-meta" style="text-align:center;"><span class="name">md</span>12px</div>
      </div><div class="col" style="align-items:center; gap:6px;">
        <div style="width:16px; height:16px; background:var(--brand-tide); border-radius:2px;"></div>
        <div class="swatch-meta" style="text-align:center;"><span class="name">lg</span>16px</div>
      </div><div class="col" style="align-items:center; gap:6px;">
        <div style="width:24px; height:24px; background:var(--brand-tide); border-radius:2px;"></div>
        <div class="swatch-meta" style="text-align:center;"><span class="name">xl</span>24px</div>
      </div><div class="col" style="align-items:center; gap:6px;">
        <div style="width:32px; height:32px; background:var(--brand-tide); border-radius:2px;"></div>
        <div class="swatch-meta" style="text-align:center;"><span class="name">2xl</span>32px</div>
      </div><div class="col" style="align-items:center; gap:6px;">
        <div style="width:48px; height:48px; background:var(--brand-tide); border-radius:2px;"></div>
        <div class="swatch-meta" style="text-align:center;"><span class="name">3xl</span>48px</div>
      </div><div class="col" style="align-items:center; gap:6px;">
        <div style="width:64px; height:64px; background:var(--brand-tide); border-radius:2px;"></div>
        <div class="swatch-meta" style="text-align:center;"><span class="name">4xl</span>64px</div>
      </div>
  </div>

</div>
</body>
</html>

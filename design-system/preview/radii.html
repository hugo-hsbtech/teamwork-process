<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">

  <div class="eyebrow">SPACING · CORNER RADII</div>
  <div class="row" style="gap:14px;">
    <div class="col" style="align-items:center; gap:6px;">
        <div style="width:64px; height:48px; background:var(--surface-card); border:1px solid var(--border-strong); border-radius:6px;"></div>
        <div class="swatch-meta" style="text-align:center;"><span class="name">sm</span>6px</div>
      </div><div class="col" style="align-items:center; gap:6px;">
        <div style="width:64px; height:48px; background:var(--surface-card); border:1px solid var(--border-strong); border-radius:8px;"></div>
        <div class="swatch-meta" style="text-align:center;"><span class="name">md</span>8px</div>
      </div><div class="col" style="align-items:center; gap:6px;">
        <div style="width:64px; height:48px; background:var(--surface-card); border:1px solid var(--border-strong); border-radius:12px;"></div>
        <div class="swatch-meta" style="text-align:center;"><span class="name">lg</span>12px</div>
      </div><div class="col" style="align-items:center; gap:6px;">
        <div style="width:64px; height:48px; background:var(--surface-card); border:1px solid var(--border-strong); border-radius:16px;"></div>
        <div class="swatch-meta" style="text-align:center;"><span class="name">xl</span>16px</div>
      </div><div class="col" style="align-items:center; gap:6px;">
        <div style="width:64px; height:48px; background:var(--surface-card); border:1px solid var(--border-strong); border-radius:9999px;"></div>
        <div class="swatch-meta" style="text-align:center;"><span class="name">full</span>9999px</div>
      </div>
  </div>

</div>
</body>
</html>

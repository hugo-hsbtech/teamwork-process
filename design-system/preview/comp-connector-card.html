<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Components — connector card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">

  <div class="eyebrow">COMPONENT · CONNECTOR CARD (default + selected)</div>
  <div class="row" style="gap:14px;">
    <div style="width:300px; height:72px; box-sizing:border-box; padding:16px; background:var(--surface-card); border:1px solid var(--border-hairline); border-radius:12px; display:flex; gap:12px; align-items:center;">
      <div style="width:36px; height:36px; border-radius:8px; background:var(--surface-sunken); display:flex; align-items:center; justify-content:center; font:400 16px/1 var(--font-display); color:var(--text-muted);">◆</div>
      <div style="display:flex; flex-direction:column; gap:2px;">
        <div style="font:700 13px/1.1 var(--font-display); color:var(--text-ink);">Slack</div>
        <div style="font:400 12px/1.2 var(--font-sans); color:var(--text-muted);">Post messages to channels and DMs</div>
      </div>
    </div>
    <div style="width:300px; height:72px; box-sizing:border-box; padding:14.5px; background:var(--brand-tide-wash); border:1.5px solid var(--brand-tide); border-radius:12px; display:flex; gap:12px; align-items:center;">
      <div style="width:36px; height:36px; border-radius:8px; background:white; display:flex; align-items:center; justify-content:center; font:400 16px/1 var(--font-display); color:var(--brand-tide);">◆</div>
      <div style="display:flex; flex-direction:column; gap:2px;">
        <div style="font:700 13px/1.1 var(--font-display); color:var(--brand-tide-text);">Linear</div>
        <div style="font:400 12px/1.2 var(--font-sans); color:var(--text-muted);">Create issues from chat turns</div>
      </div>
    </div>
  </div>

</div>
</body>
</html>

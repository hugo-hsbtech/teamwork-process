<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Components — buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">

  <div class="eyebrow">COMPONENT · BUTTONS</div>
  <div class="row" style="gap:10px; align-items:center;">
    <button style="font:700 14px/1 var(--font-display); color:var(--text-on-brand); background:var(--brand-tide); border:0; border-radius:8px; padding:8px 14px; cursor:pointer;">New agent</button>
    <button style="font:700 14px/1 var(--font-display); color:var(--text-ink); background:var(--surface-card); border:1px solid var(--border-hairline); border-radius:8px; padding:8px 14px; cursor:pointer;">Back</button>
    <button style="font:700 14px/1 var(--font-display); color:var(--text-ink); background:transparent; border:0; border-radius:8px; padding:8px 14px; cursor:pointer;">Cancel</button>
    <button style="font:700 14px/1 var(--font-display); color:var(--text-on-brand); background:var(--brand-tide); border:0; border-radius:8px; padding:10px 18px; cursor:pointer;">Continue →</button>
    <button style="font:700 14px/1 var(--font-display); color:var(--state-error); background:var(--state-error-wash); border:0; border-radius:8px; padding:8px 14px; cursor:pointer;">Delete</button>
  </div>
  <div class="t-body-sm">Primary · ghost · text · primary-lg · destructive. Radius 8, weight 700, height 34/38.</div>

</div>
</body>
</html>

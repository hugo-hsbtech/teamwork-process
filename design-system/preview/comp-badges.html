<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Components — state badges</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">

  <div class="eyebrow">COMPONENT · STATE BADGES</div>
  <div class="row tight">
    
      <span style="display:inline-flex; align-items:center; gap:6px; padding:4px 10px 4px 8px; border-radius:9999px; background:var(--state-draft-wash); font:700 11px/1 var(--font-display); letter-spacing:0.04em; color:var(--state-draft);">
        <span style="width:7px; height:7px; border-radius:50%; background:var(--state-draft);"></span>Draft
      </span>
      <span style="display:inline-flex; align-items:center; gap:6px; padding:4px 10px 4px 8px; border-radius:9999px; background:var(--state-staging-wash); font:700 11px/1 var(--font-display); letter-spacing:0.04em; color:var(--state-staging);">
        <span style="width:7px; height:7px; border-radius:50%; background:var(--state-staging);"></span>Staging
      </span>
      <span style="display:inline-flex; align-items:center; gap:6px; padding:4px 10px 4px 8px; border-radius:9999px; background:var(--state-canary-wash); font:700 11px/1 var(--font-display); letter-spacing:0.04em; color:var(--state-canary);">
        <span style="width:7px; height:7px; border-radius:50%; background:var(--state-canary);"></span>Canary
      </span>
      <span style="display:inline-flex; align-items:center; gap:6px; padding:4px 10px 4px 8px; border-radius:9999px; background:var(--state-running-wash); font:700 11px/1 var(--font-display); letter-spacing:0.04em; color:var(--state-running);">
        <span style="width:7px; height:7px; border-radius:50%; background:var(--state-running);"></span>Running
      </span>
      <span style="display:inline-flex; align-items:center; gap:6px; padding:4px 10px 4px 8px; border-radius:9999px; background:var(--state-production-wash); font:700 11px/1 var(--font-display); letter-spacing:0.04em; color:var(--state-production);">
        <span style="width:7px; height:7px; border-radius:50%; background:var(--state-production);"></span>Production
      </span>
      <span style="display:inline-flex; align-items:center; gap:6px; padding:4px 10px 4px 8px; border-radius:9999px; background:var(--state-paused-wash); font:700 11px/1 var(--font-display); letter-spacing:0.04em; color:var(--state-paused);">
        <span style="width:7px; height:7px; border-radius:50%; background:var(--state-paused);"></span>Paused
      </span>
      <span style="display:inline-flex; align-items:center; gap:6px; padding:4px 10px 4px 8px; border-radius:9999px; background:var(--state-error-wash); font:700 11px/1 var(--font-display); letter-spacing:0.04em; color:var(--state-error);">
        <span style="width:7px; height:7px; border-radius:50%; background:var(--state-error);"></span>Error
      </span>
  </div>

</div>
</body>
</html>

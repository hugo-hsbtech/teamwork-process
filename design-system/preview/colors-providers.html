<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Colors — provider chips</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">

  <div class="eyebrow">COLOR · MODEL PROVIDERS</div>
  <div class="row" style="gap:16px;">
    <div class="col"><div class="swatch" style="background:var(--provider-claude);"></div><div class="swatch-meta"><span class="name">claude</span>var(--provider-claude)<br>CC785C</div></div>
    <div class="col"><div class="swatch" style="background:var(--provider-openai);"></div><div class="swatch-meta"><span class="name">openai</span>var(--provider-openai)<br>10A37F</div></div>
    <div class="col"><div class="swatch" style="background:var(--provider-gemini);"></div><div class="swatch-meta"><span class="name">gemini</span>var(--provider-gemini)<br>5B8DEF</div></div>
    <div class="col"><div class="swatch" style="background:var(--provider-grok);"></div><div class="swatch-meta"><span class="name">grok</span>var(--provider-grok)<br>4B5563</div></div>
  </div>

</div>

</html>

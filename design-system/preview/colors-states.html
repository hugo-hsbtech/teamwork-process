<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Colors — lifecycle states</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">

  <div class="eyebrow">COLOR · LIFECYCLE STATES</div>
  <div class="row tight">
    <div class="col"><div class="swatch" style="background:var(--state-draft);"></div><div class="swatch-meta"><span class="name">draft</span>var(--state-draft)<br>slate-500</div></div>
    <div class="col"><div class="swatch" style="background:var(--state-staging);"></div><div class="swatch-meta"><span class="name">staging</span>var(--state-staging)<br>violet-500</div></div>
    <div class="col"><div class="swatch" style="background:var(--state-canary);"></div><div class="swatch-meta"><span class="name">canary</span>var(--state-canary)<br>amber-500</div></div>
    <div class="col"><div class="swatch" style="background:var(--state-running);"></div><div class="swatch-meta"><span class="name">running</span>var(--state-running)<br>tide-500</div></div>
    <div class="col"><div class="swatch" style="background:var(--state-production);"></div><div class="swatch-meta"><span class="name">production</span>var(--state-production)<br>green-600</div></div>
    <div class="col"><div class="swatch" style="background:var(--state-paused);"></div><div class="swatch-meta"><span class="name">paused</span>var(--state-paused)<br>amber-600</div></div>
    <div class="col"><div class="swatch" style="background:var(--state-error);"></div><div class="swatch-meta"><span class="name">error</span>var(--state-error)<br>red-600</div></div>
  </div>

</div>
</body>
</html>

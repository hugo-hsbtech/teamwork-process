<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Components — segmented control</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">

  <div class="eyebrow">COMPONENT · SEGMENTED / VIEW TOGGLE</div>
  <div class="row" style="gap:14px; align-items:center;">
    <div style="display:inline-flex; padding:3px; background:var(--surface-card); border:1px solid var(--border-hairline); border-radius:8px;">
      <div style="padding:6px 14px; background:var(--brand-tide); color:var(--text-on-brand); border-radius:6px; font:700 12px/1 var(--font-display);">Blocks</div>
      <div style="padding:6px 14px; color:var(--text-muted); font:500 12px/1 var(--font-display);">Table</div>
    </div>
    <div style="display:inline-flex; padding:3px; background:var(--surface-sunken); border-radius:8px;">
      <div style="padding:6px 14px; color:var(--text-muted); font:500 12px/1 var(--font-display);">stdio</div>
      <div style="padding:6px 14px; background:var(--surface-card); border:1px solid var(--border-hairline); color:var(--text-ink); border-radius:6px; font:700 12px/1 var(--font-display);">SSE</div>
      <div style="padding:6px 14px; color:var(--text-muted); font:500 12px/1 var(--font-display);">streamable-http</div>
    </div>
  </div>

</div>
</body>
</html>

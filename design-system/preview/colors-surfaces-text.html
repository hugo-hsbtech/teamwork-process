<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Colors — surfaces & text</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">

  <div class="eyebrow">COLOR · SURFACES + TEXT</div>
  <div class="row tight">
    <div class="col"><div class="swatch" style="background:var(--surface-canvas);"></div><div class="swatch-meta"><span class="name">canvas</span>var(--surface-canvas)<br>stone-50</div></div>
    <div class="col"><div class="swatch" style="background:var(--surface-card);"></div><div class="swatch-meta"><span class="name">card</span>var(--surface-card)<br>white</div></div>
    <div class="col"><div class="swatch" style="background:var(--surface-sunken);"></div><div class="swatch-meta"><span class="name">sunken</span>var(--surface-sunken)<br>stone-100</div></div>
    <div class="col"><div class="swatch" style="background:var(--surface-inverse);"></div><div class="swatch-meta"><span class="name">inverse</span>var(--surface-inverse)<br>stone-900</div></div>
  </div>
  <div class="row tight" style="margin-top:4px;">
    <div class="col"><div class="swatch" style="background:var(--text-ink);"></div><div class="swatch-meta"><span class="name">text/ink</span>var(--text-ink)<br>stone-900</div></div>
    <div class="col"><div class="swatch" style="background:var(--text-muted);"></div><div class="swatch-meta"><span class="name">text/muted</span>var(--text-muted)<br>stone-600</div></div>
    <div class="col"><div class="swatch" style="background:var(--text-faint);"></div><div class="swatch-meta"><span class="name">text/faint</span>var(--text-faint)<br>stone-500</div></div>
  </div>

</div>
</body>
</html>
